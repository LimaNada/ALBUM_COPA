<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Álbum Copa 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap');
:root{--green:#00A86B;--green-light:#d4f5e9;--amber:#F4A623;--amber-light:#fef3d7;--red:#E53935;--bg:#f4f2ed;--surface:#fff;--surface2:#f9f8f5;--border:#e0ddd6;--text:#1a1a1a;--muted:#888;--gold:#D4A017}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app-header{background:#1a1a1a;color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.trophy-icon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.5px;line-height:1}
.header-sub{font-size:11px;color:#aaa;margin-top:2px}
.progress-bar{height:6px;background:#333;border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#00d68f);border-radius:3px;transition:width .4s ease;width:0%}
.progress-label{font-size:11px;color:#bbb;text-align:right}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.stat-box{text-align:center;padding:10px 4px;border-radius:10px}
.stat-box.green{background:var(--green-light)}.stat-box.amber{background:var(--amber-light)}.stat-box.plain{background:var(--surface2)}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;line-height:1}
.stat-box.green .stat-val{color:#007a4d}.stat-box.amber .stat-val{color:#c07800}.stat-box.plain .stat-val{color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.controls{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.search-wrap{position:relative}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:'Barlow',sans-serif;background:var(--surface2);color:var(--text);outline:none}
.search-input:focus{border-color:var(--green)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);pointer-events:none}
.filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);font-size:12px;font-family:'Barlow',sans-serif;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.filter-btn.green.active{background:var(--green);border-color:var(--green)}
.filter-btn.amber.active{background:var(--amber);border-color:var(--amber)}
.legend{display:flex;gap:14px;padding:8px 16px;background:var(--bg);font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);align-items:center}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.main-content{padding:10px 12px 80px}
.group-sep{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:14px 4px 6px;display:flex;align-items:center;gap:8px}
.group-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
.team-header{display:flex;align-items:center;padding:12px 14px;cursor:pointer;user-select:none;gap:10px}
.team-flag{font-size:24px;flex-shrink:0}
.team-info{flex:1;min-width:0}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;line-height:1}
.team-code{font-size:11px;color:var(--green);font-weight:700;letter-spacing:1px}
.team-count{font-size:11px;color:var(--muted);margin-top:2px}
.team-mini-prog{width:50px;height:5px;background:#eee;border-radius:3px;margin-top:5px;overflow:hidden}
.team-mini-fill{height:100%;background:var(--green);border-radius:3px}
.chevron{font-size:18px;color:var(--muted);transition:transform .25s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.team-body{padding:0 12px 12px;border-top:1px solid var(--border)}
.sticker-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding-top:10px}
.sticker-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--border);border-radius:10px;cursor:pointer;background:var(--surface2);-webkit-user-select:none;user-select:none}
.sticker-item:active{transform:scale(.97)}
.sticker-item.have{background:#edfaf4;border-color:#a5dfc8}
.sticker-item.repeat{background:#fff8ec;border-color:#f5d98a}
.sticker-item.team-photo{border-style:dashed;border-color:#9bb;background:#f0f6f6}
.sticker-item.team-photo.have{background:#edfaf4;border-color:#a5dfc8;border-style:solid}
.sticker-item.team-photo.repeat{background:#fff8ec;border-color:#f5d98a;border-style:solid}
.sticker-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);min-width:30px;text-align:center;flex-shrink:0}
.sticker-name{font-size:11px;color:var(--text);flex:1;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sticker-badge{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--border);background:transparent;transition:all .15s}
.sticker-item.have .sticker-badge{background:var(--green);border-color:var(--green)}
.sticker-item.repeat .sticker-badge{background:var(--amber);border-color:var(--amber)}
.export-panel{display:none;padding:0 12px 80px}
.export-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.export-card-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.export-card-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700}
.export-card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.export-btn{display:flex;align-items:center;gap:10px;width:100%;padding:14px 16px;background:none;border:none;font-size:14px;font-family:'Barlow',sans-serif;color:var(--text);cursor:pointer;text-align:left;border-top:1px solid var(--border);transition:background .12s}
.export-btn:first-child{border-top:none}
.export-btn:active{background:var(--surface2)}
.export-btn .btn-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.btn-icon.green{background:var(--green-light)}.btn-icon.amber{background:var(--amber-light)}.btn-icon.dark{background:#eee}.btn-icon.red{background:#fde}
.btn-text strong{display:block;font-weight:600;font-size:14px}
.btn-text span{font-size:11px;color:var(--muted)}
.copy-preview{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:11px;color:var(--muted);white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;margin:12px 16px;line-height:1.6}
.fmt-selector{padding:12px 16px;border-bottom:1px solid var(--border)}
.fmt-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px}
.fmt-options{display:flex;gap:6px;flex-wrap:wrap}
.fmt-btn{padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);font-size:12px;font-family:'Barlow',sans-serif;color:var(--muted);cursor:pointer;transition:all .15s}
.fmt-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.import-area{margin:10px 16px}
.import-textarea{width:100%;min-height:80px;padding:10px;border:1px solid var(--border);border-radius:10px;font-family:'Barlow',sans-serif;font-size:12px;color:var(--text);background:var(--surface2);resize:none;margin-bottom:8px;outline:none}
.import-confirm-btn{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer}
.reset-btn{color:var(--red)!important}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;display:flex;border-top:1px solid #333;z-index:100}
.nav-btn{flex:1;padding:10px 4px 12px;background:none;border:none;color:#666;font-family:'Barlow',sans-serif;font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nav-btn .nav-icon{font-size:20px}
.nav-btn.active{color:var(--amber)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px}
</style>
</head>

</div>
<div class="legend">

<div class="main-content" id="main-content"></div>

const TOTAL=TEAMS.length*20+SPECIALS.length;
let state={},openTeams={},currentFilter='all',currentTab='album',exportFmt='code_num';
const SK='copa2026v5';

function load(){try{const r=localStorage.getItem(SK);if(r)state=JSON.parse(r);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
function getS(k){return state[k]||0;}
function setS(k){
  state[k]=((state[k]||0)+1)%3;save();updateStats();
  const el=document.querySelector('[data-key="'+CSS.escape(k)+'"]');
  if(el){
    const s=getS(k);const isP=el.dataset.photo==='1';
    el.className='sticker-item'+(isP?' team-photo':'')+(s===1?' have':s===2?' repeat':'');
    const b=el.querySelector('.sticker-badge');
    b.style.background=s===1?'var(--green)':s===2?'var(--amber)':'transparent';
    b.style.borderColor=s===1?'var(--green)':s===2?'var(--amber)':'var(--border)';
    updateTeamHeader(el);
  }
}
function updateTeamHeader(el){
  if(!el)return;const card=el.closest('.team-card');if(!card)return;
  const tc=card.dataset.team;const team=TEAMS.find(t=>t.code===tc);if(!team)return;
  let have=0;for(let i=1;i<=20;i++){if(getS(tc+'|'+i)===1)have++;}
  const pct=Math.round(have/20*100);
  const c=card.querySelector('.team-count');const f=card.querySelector('.team-mini-fill');
  if(c)c.textContent=have+'/20 figurinhas';if(f)f.style.width=pct+'%';
}
function updateStats(){
  let have=0,rep=0;
  TEAMS.forEach(t=>{for(let i=1;i<=20;i++){const s=getS(t.code+'|'+i);if(s===1)have++;if(s===2)rep++;}});
  SPECIALS.forEach(sp=>{const s=getS(sp.code+'|'+sp.num);if(s===1)have++;if(s===2)rep++;});
  document.getElementById('st-have').textContent=have;
  document.getElementById('st-miss').textContent=TOTAL-have;
  document.getElementById('st-rep').textContent=rep;
  const pct=Math.round(have/TOTAL*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=have+' / '+TOTAL+' · '+pct+'% completo';
}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTeams();}
function showTab(tab){
  currentTab=tab;
  document.getElementById('main-content').style.display=tab==='album'?'block':'none';
  document.querySelectorAll('.controls,.legend').forEach(el=>el.style.display=tab==='album'?'':'none');
  document.getElementById('export-panel').style.display=tab==='export'?'block':'none';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='export')renderExport();
}
function shouldShow(s){
  if(currentFilter==='all')return true;if(currentFilter==='have')return s===1;
  if(currentFilter==='missing')return s===0;if(currentFilter==='repeat')return s===2;return true;
}
function toggle(code){openTeams[code]=!openTeams[code];renderTeams();}
function renderTeams(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const mc=document.getElementById('main-content');let html='';let curG='';
  TEAMS.forEach(t=>{
    let hc=0,rc=0;for(let i=1;i<=20;i++){const s=getS(t.code+'|'+i);if(s===1)hc++;if(s===2)rc++;}
    const pct=Math.round(hc/20*100);
    if(currentFilter==='have'&&hc===0)return;if(currentFilter==='missing'&&hc===20)return;
    if(currentFilter==='repeat'&&rc===0)return;
    if(q&&!t.name.toLowerCase().includes(q)&&!t.code.toLowerCase().includes(q)&&!t.p.some(p=>p.toLowerCase().includes(q)))return;
    if(t.g!==curG){curG=t.g;html+=`<div class="group-sep">Grupo ${curG}</div>`;}
    const isOpen=openTeams[t.code];
    html+=`<div class="team-card" data-team="${t.code}"><div class="team-header" onclick="toggle('${t.code}')"><span class="team-flag">${t.flag}</span><div class="team-info"><div style="display:flex;align-items:baseline;gap:6px"><span class="team-name">${t.name}</span><span class="team-code">${t.code}</span></div><div class="team-count">${hc}/20 figurinhas${rc>0?' · '+rc+' rep.':''}</div><div class="team-mini-prog"><div class="team-mini-fill" style="width:${pct}%"></div></div></div><span class="chevron ${isOpen?'open':''}">⌄</span></div>`;
    if(isOpen){
      html+=`<div class="team-body"><div class="sticker-grid">`;
      for(let i=1;i<=20;i++){
        const name=t.p[i-1];
        if(q&&!name.toLowerCase().includes(q)&&!t.name.toLowerCase().includes(q)&&!t.code.toLowerCase().includes(q))continue;
        const k=t.code+'|'+i;const s=getS(k);if(!shouldShow(s))continue;
        const isPhoto=(i===13);
        const cls=(isPhoto?'team-photo ':'')+( s===1?'have':s===2?'repeat':'');
        const bg=s===1?'var(--green)':s===2?'var(--amber)':'transparent';
        const bc=s===1?'var(--green)':s===2?'var(--amber)':'var(--border)';
        html+=`<div class="sticker-item ${cls}" data-key="${k}" data-photo="${isPhoto?1:0}" onclick="setS('${k.replace(/'/g,"\\'")}')"><span class="sticker-num">${t.code}${i}</span><span class="sticker-name">${name}</span><span class="sticker-badge" style="background:${bg};border-color:${bc}"></span></div>`;
      }
      html+=`</div></div>`;
    }
    html+=`</div>`;
  });
  // Render specials sections
  const secs=[{id:'FWC',label:'✨ Especiais — FWC (FOIL)',icon:'🌟'},{id:'COC',label:'🥤 Coca-Cola (exclusivas)',icon:'🥤'}];
  secs.forEach(sec=>{
    const items=SPECIALS.filter(sp=>sp.sec===sec.id);
    if(!items.length)return;
    let hc=items.filter(sp=>getS(sp.code+'|'+sp.num)===1).length;
    let rc=items.filter(sp=>getS(sp.code+'|'+sp.num)===2).length;
    let anyMatch=items.some(sp=>{
      const s=getS(sp.code+'|'+sp.num);
      if(!shouldShow(s))return false;
      if(q&&!sp.name.toLowerCase().includes(q)&&!sp.code.toLowerCase().includes(q))return false;
      return true;
    });
    if(currentFilter==='have'&&hc===0)return;
    if(currentFilter==='missing'&&hc===items.length)return;
    if(currentFilter==='repeat'&&rc===0)return;
    if(!anyMatch&&q)return;
    html+=`<div class="group-sep">${sec.label}</div>`;
    html+=`<div class="team-card" data-team="${sec.id}"><div class="team-body" style="padding-top:10px"><div class="sticker-grid">`;
    items.forEach(sp=>{
      const s=getS(sp.code+'|'+sp.num);
      if(!shouldShow(s))return;
      if(q&&!sp.name.toLowerCase().includes(q)&&!sp.code.toLowerCase().includes(q))return;
      const k=sp.code+'|'+sp.num;
      const cls='sticker-item team-photo'+(s===1?' have':s===2?' repeat':'');
      const bg=s===1?'var(--green)':s===2?'var(--amber)':'transparent';
      const bc=s===1?'var(--green)':s===2?'var(--amber)':'var(--border)';
      html+=`<div class="${cls}" data-key="${k}" data-photo="1" onclick="setS('${k.replace(/'/g,"\'")}')"><span class="sticker-num" style="font-size:10px">${sp.code}${sp.num}</span><span class="sticker-name">${sp.name}</span><span class="sticker-badge" style="background:${bg};border-color:${bc}"></span></div>`;
    });
    html+=`</div></div></div>`;
  });
  if(!html)html=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Nenhuma figurinha encontrada</div></div>`;
  mc.innerHTML=html;
}
function fmtSticker(code,num,name){
  if(exportFmt==='code_num')return code+num;
  if(exportFmt==='code_name')return code+' '+name;
  return code+num+' '+name;
}
function setFmt(fmt,btn){exportFmt=fmt;document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function renderExport(){
  document.getElementById('export-panel').innerHTML=`<div style="padding:12px 0">
    <div class="export-card">
      <div class="export-card-header"><div class="export-card-title">🏷️ Formato de exportação</div><div class="export-card-sub">Como as figurinhas aparecem na lista copiada</div></div>
      <div class="fmt-selector"><div class="fmt-label">Escolha o formato:</div><div class="fmt-options">
        <button class="fmt-btn ${exportFmt==='code_num'?'active':''}" onclick="setFmt('code_num',this)">HAI14</button>
        <button class="fmt-btn ${exportFmt==='code_name'?'active':''}" onclick="setFmt('code_name',this)">HAI Christopher Attys</button>
        <button class="fmt-btn ${exportFmt==='code_num_name'?'active':''}" onclick="setFmt('code_num_name',this)">HAI14 Christopher Attys</button>
      </div></div>
    </div>
    <div class="export-card">
      <div class="export-card-header"><div class="export-card-title">📋 Listas para troca</div><div class="export-card-sub">Copie e mande para grupos de troca</div></div>
      <button class="export-btn" onclick="copyList('missing')"><div class="btn-icon dark">📋</div><div class="btn-text"><strong>Copiar faltantes</strong><span>Figurinhas que ainda faltam</span></div></button>
      <button class="export-btn" onclick="copyList('repeat')"><div class="btn-icon amber">🔄</div><div class="btn-text"><strong>Copiar repetidas</strong><span>Para oferecer em troca</span></div></button>
      <div id="copy-preview"></div>
    </div>
    <div class="export-card">
      <div class="export-card-header"><div class="export-card-title">💾 Backup</div><div class="export-card-sub">Salve e restaure seu progresso</div></div>
      <button class="export-btn" onclick="doBackup()"><div class="btn-icon green">⬇️</div><div class="btn-text"><strong>Baixar backup (JSON)</strong><span>Arquivo salvo nos Downloads</span></div></button>
      <button class="export-btn" onclick="toggleImport()"><div class="btn-icon dark">⬆️</div><div class="btn-text"><strong>Restaurar backup</strong><span>Cole o JSON para recuperar</span></div></button>
      <div id="import-area" style="display:none" class="import-area"><textarea class="import-textarea" id="import-ta" placeholder="Cole aqui o JSON do backup..."></textarea><button class="import-confirm-btn" onclick="doImport()">Restaurar agora</button></div>
    </div>
    <div class="export-card">
      <div class="export-card-header"><div class="export-card-title">⚠️ Zona de perigo</div><div class="export-card-sub">Ações irreversíveis</div></div>
      <button class="export-btn reset-btn" onclick="doReset()"><div class="btn-icon red">🗑️</div><div class="btn-text"><strong>Zerar tudo</strong><span>Remove todos os registros</span></div></button>
    </div>
  </div>`;
}
function copyList(type){
  const lines=[];
  TEAMS.forEach(t=>{
    const items=[];
    for(let i=1;i<=20;i++){const s=getS(t.code+'|'+i);const name=t.p[i-1];
      if(type==='missing'&&s===0)items.push(fmtSticker(t.code,i,name));
      if(type==='repeat'&&s===2)items.push(fmtSticker(t.code,i,name));
    }
    if(items.length)lines.push(t.flag+' '+t.name+': '+items.join(', '));
  });
  const specItems=[];
  SPECIALS.forEach(sp=>{const s=getS(sp.code+'|'+sp.num);
    if(type==='missing'&&s===0)specItems.push(fmtSticker(sp.code,sp.num,sp.name));
    if(type==='repeat'&&s===2)specItems.push(fmtSticker(sp.code,sp.num,sp.name));
  });
  if(specItems.length)lines.push('✨ Especiais: '+specItems.join(', '));
  const count=type==='missing'?TEAMS.reduce((a,t)=>{let c=0;for(let i=1;i<=20;i++){if(getS(t.code+'|'+i)===0)c++;}return a+c;},0)+SPECIALS.filter(sp=>getS(sp.code+'|'+sp.num)===0).length:Object.values(state).filter(v=>v===2).length;
  const label=type==='missing'?'FALTANTES':'REPETIDAS';
  const text=lines.length?'📋 ÁLBUM COPA 2026 — '+label+' ('+count+'):\n\n'+lines.join('\n'):'✅ Nenhuma figurinha '+(type==='missing'?'faltante':'repetida')+'!';
  const prev=document.getElementById('copy-preview');
  if(prev)prev.innerHTML='<div class="copy-preview">'+text+'</div>';
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>toast('Lista copiada! ✓')).catch(()=>toast('Selecione o texto acima'));}
  else{toast('Selecione o texto para copiar');}
}
function doBackup(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='album_copa2026_backup.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('Backup baixado! ✓');
}
function toggleImport(){const el=document.getElementById('import-area');if(el)el.style.display=el.style.display==='none'?'block':'none';}
function doImport(){
  try{const parsed=JSON.parse(document.getElementById('import-ta').value.trim());state=parsed;save();updateStats();renderExport();toast('Dados restaurados! ✓');}
  catch(e){toast('JSON inválido. Verifique o arquivo.');}
}
function doReset(){if(confirm('Tem certeza? Isso apaga todo o seu progresso!')){state={};save();updateStats();renderTeams();toast('Dados zerados.');}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
load();updateStats();renderTeams();
</script>
</body>
</html>
